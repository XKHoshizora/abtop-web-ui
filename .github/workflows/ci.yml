name: CI

# Validates PRs (incl. Renovate's abtop bump PRs) and pushes to master.
# Renovate auto-merges an abtop update only once this workflow is green, so the
# upstream library can't land a breaking change without a red build first.
on:
  pull_request:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Typecheck frontend
        working-directory: web
        run: pnpm typecheck

      # rust-embed bakes web/dist into the binary, so build the SPA before cargo.
      - name: Build frontend
        working-directory: web
        run: pnpm build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build + test
        run: cargo test --locked
